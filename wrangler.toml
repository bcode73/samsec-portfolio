name = "samsec-portfolio"
compatibility_date = "2025-01-01"
main = "worker/index.ts"

[assets]
directory = "out"
binding = "ASSETS"
not_found_handling = "404-page"

# Secrets (set via `wrangler secret put <NAME>` or the Cloudflare dashboard):
#   RESEND_API_KEY       email delivery for /api/contact and /api/subscribe
#   CONTACT_TO_EMAIL      inbox that receives contact form submissions
#   RESEND_AUDIENCE_ID    newsletter audience for /api/subscribe
#   TURNSTILE_SECRET_KEY  pairs with NEXT_PUBLIC_TURNSTILE_SITE_KEY (build-time env var)
#
# See CONTENT_TODO.md for the full pre-launch checklist.
